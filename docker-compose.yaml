version: '3'

services:
  migrations:
    image: 'mediacms/mediacms:latest'
    volumes:
      - '/media/2tb/mediacms/media_files:/home/mediacms/mediacms/media_files/'
      - 'logs:/home/mediacms/mediacms/logs/'
    environment:
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_CELERY_BEAT: 'no'
      ADMIN_USER: yurgeman
      ADMIN_EMAIL: yura@site.net
      ADMIN_PASSWORD: yurgeman123
    command: ./deploy/docker/prestart.sh
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  web:
    image: 'mediacms/mediacms:latest'
    deploy:
      replicas: 1
    volumes:
      - '/media/2tb/mediacms/media_files:/home/mediacms/mediacms/media_files/'
      - 'logs:/home/mediacms/mediacms/logs/'
    environment:
      ENABLE_CELERY_BEAT: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_MIGRATIONS: 'no'
    depends_on:
      - migrations

  celery_beat:
    image: 'mediacms/mediacms:latest'
    volumes:
      - '/media/2tb/mediacms/media_files:/home/mediacms/mediacms/media_files/'
      - 'logs:/home/mediacms/mediacms/logs/'
    environment:
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_MIGRATIONS: 'no'
    depends_on:
      - redis

  celery_worker:
    image: 'mediacms/mediacms:latest'
    deploy:
      replicas: 1
    volumes:
      - '/media/2tb/mediacms/media_files:/home/mediacms/mediacms/media_files/'
      - 'logs:/home/mediacms/mediacms/logs/'
    environment:
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_BEAT: 'no'
      ENABLE_MIGRATIONS: 'no'
    depends_on:
      - migrations

  db:
    image: 'postgres:17.2-alpine'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data/'
    restart: always
    environment:
      POSTGRES_USER: mediacms
      POSTGRES_PASSWORD: mediacms
      POSTGRES_DB: mediacms
      TZ: Europe/London
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}'
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: 'redis:alpine'
    restart: always
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  media_files:
    driver: local
    driver_opts:
      type: none
      device: /media/2tb/mediacms/media_files
      o: bind
  logs: null
  postgres_data: null
